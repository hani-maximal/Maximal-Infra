incident_type: ec2_instance_status_check_failed
source: [self_detect]
detect:
  service: getmaximal.com
  signal:
    http_reachable: "false for 3 consecutive checks"
min_confidence: 0.90
allowed_actions:
  - restart_ec2_instance
approval:
  mode: always_human
  blast_radius:
    max_affected_services: 1
    environments: [production, staging]
    allowed_action_types: [restart_ec2_instance]
    require_reversible: true
verify:
  window: 5m
  checks:
    - { metric: http_status, condition: "200 for 5m" }
rollback_if_failed: false
on_resolve:
  draft_postmortem: true
  learn_contract: false
notify:
  slack_channel: "#prod-incidents"
